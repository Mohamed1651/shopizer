##
## db configuration for test
##

#for using memory database
db.jdbcUrl=jdbc\:h2\:mem\:SALESMANAGER-TEST;MVCC=TRUE;LOCK_TIMEOUT=10000;INIT\=RUNSCRIPT FROM 'src/test/resources/sql/create_schema.sql'
db.user=test
db.password=password
db.driverClass=org.h2.Driver
hibernate.dialect=org.hibernate.dialect.H2Dialect

db.show.sql=false
db.schema=SALESMANAGER
hibernate.hbm2ddl.auto=create

db.preferredTestQuery=SELECT 1


##
## db pool settings
##
db.initialPoolSize=10
db.minPoolSize=10
db.maxPoolSize=100

spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000